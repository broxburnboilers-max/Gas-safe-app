<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2a52d4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Gas Safety – West Lothian Gas Ltd</title>
  </head>
  <body>
    <!-- Hidden Netlify form for bot detection (React submits via JS fetch) -->
    <form name="support-ticket" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="ticket_ref" />
      <input name="ticket_type" />
      <input name="screen" />
      <input name="username" />
      <input name="engineer_name" />
      <input name="company_name" />
      <input name="gas_safe_no" />
      <input name="contact_name" />
      <input name="contact_email" />
      <input name="contact_phone" />
      <textarea name="description"></textarea>
      <textarea name="steps_to_reproduce"></textarea>
      <textarea name="expected_behaviour"></textarea>
      <input name="screenshot_count" />
      <input name="date" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
